import lit.util

fc_executable = config.environment.get('FC')

fallback_compilers = [ 
    'flang-new',
    'flang', 
    'gfortran'
]

if not fc_executable:
    for compiler in fallback_compilers:
        fc_executable = lit.util.which(compiler, config.llvm_tools_dir)
        if fc_executable:
            break
                
        fc_executable = lit.util.which(compiler, config.environment.get('PATH'))
        if fc_executable:
            break

if fc_executable:
    config.environment['FC'] = fc_executable
    config.substitutions.append(('%FC', fc_executable))
    config.available_features.add('fortran')

else:
    config.unsupported = True